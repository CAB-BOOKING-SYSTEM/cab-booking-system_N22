# ──────────────────────────────────────────────────────────────────────────────
# Prometheus Scrape Configuration — CAB Notification Service
#
# Reload không cần restart (khi dùng --web.enable-lifecycle):
#   curl -X POST http://localhost:9090/-/reload
# ──────────────────────────────────────────────────────────────────────────────

global:
  scrape_interval: 5s       # Kéo metrics mỗi 15 giây
  evaluation_interval: 5s   # Đánh giá alerting rules mỗi 15 giây
  external_labels:
    environment: production
    project: cab-booking-system

# ── Alerting (tuỳ chọn, bật khi tích hợp Alertmanager) ──────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

# ── Rule files (chứa alerting / recording rules) ─────────────────────────────
rule_files:
  - "rules/*.yml"

# ── Scrape Jobs ───────────────────────────────────────────────────────────────
scrape_configs:

  # 1. Prometheus tự giám sát chính nó
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # 2. Notification Service — endpoint /metrics do prom-client expose
 # 2. Notification Service
 # 2. Notification Service
  - job_name: cab-notification-service
    scheme: http
    metrics_path: /metrics
    scrape_interval: 80s
    static_configs:
      - targets: ["cab_notification:3040"] # <-- Dùng đúng container_name là cab_notification
        labels:
          service: notification-service
          team: backend
  # 3. Node Exporter
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
# ── Alerting (tuỳ chọn, bật khi tích hợp Alertmanager) ──────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]