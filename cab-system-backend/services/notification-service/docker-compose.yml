version: "3.8"

# ──────────────────────────────────────────────────────────────────────────────
# NETWORK: Tất cả service giao tiếp nội bộ qua network riêng, không lộ ra ngoài
# ──────────────────────────────────────────────────────────────────────────────
networks:
  cab-net:
    driver: bridge

# ──────────────────────────────────────────────────────────────────────────────
# VOLUMES: Persistent data cho MongoDB và Redis
# ──────────────────────────────────────────────────────────────────────────────
volumes:
  # mongo_data đã xóa — dùng MongoDB Atlas (cloud)
  redis_data:

services:
  # ── 1. RabbitMQ ──────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # RabbitMQ Management UI
    networks:
      - cab-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 2. MongoDB đã xóa — kết nối Atlas qua MONGO_URI trong file .env ──────────

  # ── 3. Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - cab-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ── 4. Notification Service ───────────────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner          # Chỉ build đến stage runner (production)
    image: cab-notification-service:latest
    restart: unless-stopped
    ports:
      - "3004:3004"           # Dev: 1 replica → 1 port cố định, không conflict
    environment:
      - NODE_ENV=production
      - PORT=3004
      # DB_URL lấy từ .env (MONGO_URI=mongodb+srv://...)
      - DB_URL=${MONGO_URI}
      - RABBITMQ_ENABLED=true
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - REDIS_URL=redis://redis:6379
    env_file:
      - .env                  # Firebase credentials & JWT_SECRET nạp từ file .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cab-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # ── Swarm-compatible deploy block ──────────────────────────────────────────
    deploy:
      mode: replicated
      replicas: 1             # docker-compose dev: 1 replica (replicas > 1 chỉ dùng với docker stack deploy)
      update_config:
        parallelism: 1        # Rolling update: cập nhật từng replica một
        delay: 10s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
